<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protótipo Interno - Login SEI Automação</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 24px;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #444;
    }

    .box {
      width: 470px;
      background: #efefef;
      border: 1px solid #c9c9c9;
      border-radius: 6px;
      padding: 28px 44px 24px;
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff3cd;
      color: #7a5a00;
      font-size: 12px;
      font-weight: bold;
    }

    .brand {
      text-align: center;
      margin-bottom: 34px;
    }

    .brand h1 {
      margin: 0;
      font-size: 42px;
      color: #0f69b3;
      line-height: 1;
    }

    .brand p {
      margin: 8px 0 0;
      font-size: 13px;
      color: #666;
    }

    .field {
      height: 40px;
      display: flex;
      align-items: stretch;
      background: #fff;
      border: 1px solid #cfcfcf;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .icon-box {
      width: 48px;
      min-width: 48px;
      background: #f4f4f4;
      border-right: 1px solid #d3d3d3;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #555;
      font-size: 18px;
    }

    input, select {
      width: 100%;
      border: 0;
      outline: none;
      font-size: 15px;
      color: #555;
      padding: 0 12px;
      background: transparent;
    }

    button {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: 5px;
      background: #0f69b3;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 4px;
    }

    button:hover {
      background: #0c5b9c;
    }

    .footer-link {
      margin-top: 8px;
      text-align: right;
    }

    .footer-link a {
      font-size: 12px;
      color: #0b84e3;
      text-decoration: none;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    .msg {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 5px;
      font-size: 14px;
    }

    .msg.error {
      display: block;
      background: #fdeaea;
      color: #a12a2a;
      border: 1px solid #efc2c2;
    }

    .msg.success {
      display: block;
      background: #eaf7ec;
      color: #216a39;
      border: 1px solid #bfdcc6;
    }
  </style>
</head>
<body>
  <main class="box">
    <div class="tag">PROTÓTIPO INTERNO · NÃO OFICIAL</div>

    <div class="brand">
      <h1>SEI Automação</h1>
      <p>Tela de acesso do projeto</p>
    </div>

    <form id="loginForm">
      <div class="field">
        <div class="icon-box">👤</div>
        <input type="text" id="usuario" placeholder="Usuário" />
      </div>

      <div class="field">
        <div class="icon-box">🔒</div>
        <input type="password" id="senha" placeholder="Senha" />
      </div>

      <div class="field">
        <div class="icon-box">🏢</div>
        <select id="orgao">
          <option value="">Selecione o órgão</option>
          <option value="14">TRF1 - Órgão 14</option>
          <option value="1">Órgão 1</option>
          <option value="2">Órgão 2</option>
        </select>
      </div>

      <button type="submit">Acessar</button>
    </form>

    <div class="footer-link">
      <a href="#">Verificação em duas etapas</a>
    </div>

    <div id="mensagem" class="msg"></div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const mensagem = document.getElementById("mensagem");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const usuario = document.getElementById("usuario").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const orgao = document.getElementById("orgao").value;

      mensagem.className = "msg";
      mensagem.textContent = "";

      if (!usuario || !senha || !orgao) {
        mensagem.classList.add("error");
        mensagem.textContent = "Preencha usuário, senha e órgão.";
        return;
      }

      mensagem.classList.add("success");
      mensagem.textContent = "Protótipo validado com sucesso. Próximo passo: abrir o dashboard.";
    });
  </script>
</body>
</html>
