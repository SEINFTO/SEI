<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste GitHub Pages</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Meu site está online</h1>
    <p>Teste inicial do GitHub Pages com HTML, CSS e JavaScript.</p>
    <button onclick="mostrarMensagem()">Clique aqui</button>
  </div>

  <script>
    function mostrarMensagem() {
      alert("Funcionou! Seu GitHub Pages está ativo.");
    }
  </script>
</body>
</html>
